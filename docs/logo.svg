<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="TestLens">
  <defs>
    <linearGradient id="tl-ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
    <linearGradient id="tl-pupil" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Lens ring -->
  <circle cx="28" cy="28" r="18" fill="none" stroke="url(#tl-ring)" stroke-width="4"/>
  <!-- Inner lens -->
  <circle cx="28" cy="28" r="8" fill="url(#tl-pupil)"/>
  <!-- Handle -->
  <line x1="41" y1="41" x2="56" y2="56" stroke="#a5b4fc" stroke-width="5" stroke-linecap="round"/>
</svg>
